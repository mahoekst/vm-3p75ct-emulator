# ── Production version — paste this file into Home Assistant ──────────────────
# Component is fetched from GitHub; no local files needed.
# For local development use vm-3p75ct-emulator-dev.yaml instead.

substitutions:
  device_name: vm-3p75ct-emulator
  modbus_unit_id: "1"    # Victron GX uses unit ID 1 when polling via Modbus TCP

  # ── Home Assistant entity IDs ───────────────────────────────────────────────
  # Replace each value with the entity_id of the matching sensor in your HA.
  # Units:  voltage → V,  current → A,  power → W,  frequency → Hz,  energy → kWh
  ha_l1_voltage:    sensor.grid_l1_voltage
  ha_l2_voltage:    sensor.grid_l2_voltage
  ha_l3_voltage:    sensor.grid_l3_voltage
  ha_l1l2_voltage:  sensor.grid_l1l2_voltage
  ha_l2l3_voltage:  sensor.grid_l2l3_voltage
  ha_l3l1_voltage:  sensor.grid_l3l1_voltage
  ha_l1_current:    sensor.grid_l1_current
  ha_l2_current:    sensor.grid_l2_current
  ha_l3_current:    sensor.grid_l3_current
  ha_l1_power:      sensor.grid_l1_power   # positive = import, negative = export
  ha_l2_power:      sensor.grid_l2_power
  ha_l3_power:      sensor.grid_l3_power
  ha_frequency:     sensor.grid_frequency
  ha_energy_import: sensor.grid_total_energy_import   # kWh, cumulative
  ha_energy_export: sensor.grid_total_energy_export   # kWh, cumulative

# ── ESPHome core ───────────────────────────────────────────────────────────────
esphome:
  name: ${device_name}
  friendly_name: Victron VM-3P75CT Emulator
  on_boot:
    priority: 200   # after WiFi + component setup
    then:
      - lambda: |-
          // ── Native Victron VM-3P75CT identification registers ──────────────
          // Source: github.com/victronenergy/dbus-modbus-client/victron_em.py
          // The Cerbo GX reads 0x1000 to confirm product ID before accepting.

          // 0x1000: Product ID = 0xa1b1 (VM-3P75CT)
          id(victron_meter)->write_holding_register(0x1000, 0xa1b1);

          // 0x1009-0x100a: Firmware version 0.1.9.0 (enables all data paths)
          //   High word = major.minor = 0x0001
          //   Low  word = patch.build = 0x0900
          id(victron_meter)->write_holding_register(0x1009, 0x0001);
          id(victron_meter)->write_holding_register(0x100a, 0x0900);

          // 0x100b: Hardware version
          id(victron_meter)->write_holding_register(0x100b, 0x0001);

          // 0x2000: Phase config = 3 → three-phase L1+L2+L3
          id(victron_meter)->write_holding_register(0x2000, 0x0003);

          // 0x2001: Role = 0 → grid meter
          id(victron_meter)->write_holding_register(0x2001, 0x0000);

          // 0x3038: Error code = 0 (no error)
          id(victron_meter)->write_holding_register(0x3038, 0x0000);

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret esphome_ota_password

captive_portal:

logger:
  level: INFO

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret esphome_ota_password

web_server:
  port: 80
  version: 3

# ── Modbus TCP server ──────────────────────────────────────────────────────────
# Component is fetched from GitHub on first compile.
external_components:
  - source:
      type: git
      url: https://github.com/mahoekst/vm-3p75ct-emulator
      ref: main
      path: esphome/components
    components: [ modbus_tcp_server ]

modbus_tcp_server:
  id: victron_meter
  port: 502
  unit_id: ${modbus_unit_id}

# ── Internal globals for cross-phase total power ───────────────────────────────
globals:
  - id: raw_l1_power
    type: int32_t
    initial_value: "0"
  - id: raw_l2_power
    type: int32_t
    initial_value: "0"
  - id: raw_l3_power
    type: int32_t
    initial_value: "0"

# ── HA sensors → Modbus holding registers ─────────────────────────────────────
# Native Victron VM-3P75CT register map (VE_Meter_A1B1, product ID 0xa1b1).
# Source: github.com/victronenergy/dbus-modbus-client/victron_em.py
#
# Register encoding:
#   s16   → single signed 16-bit word
#   s32b  → two signed 16-bit words, high word at lower address (big-endian)
#   u32b  → same layout, unsigned
#
# Scaling (what the Cerbo expects after dividing the raw register value):
#   Voltage   s16  ÷100 → V    write: x * 100
#   Current   s16  ÷100 → A    write: x * 100
#   Power     s32b ÷1   → W    write: x (integer watts)
#   Frequency u16  ÷100 → Hz   write: x * 100
#   Energy    u32b ÷100 → kWh  write: x * 100  (HA sensor already in kWh)
#
sensor:
  # ── Phase-to-neutral voltages (s16, ÷100, V) ─────────────────────────────
  - platform: homeassistant
    id: l1_voltage
    name: "L1 Voltage"
    entity_id: ${ha_l1_voltage}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x3040, (uint16_t)(int16_t)(x * 100.0f));

  - platform: homeassistant
    id: l2_voltage
    name: "L2 Voltage"
    entity_id: ${ha_l2_voltage}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x3048, (uint16_t)(int16_t)(x * 100.0f));

  - platform: homeassistant
    id: l3_voltage
    name: "L3 Voltage"
    entity_id: ${ha_l3_voltage}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x3050, (uint16_t)(int16_t)(x * 100.0f));

  # ── Line-to-line voltages (s16, ÷100, V) — VoltageLineToLine per phase ──
  - platform: homeassistant
    id: l1l2_voltage
    name: "L1-L2 Voltage"
    entity_id: ${ha_l1l2_voltage}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x3046, (uint16_t)(int16_t)(x * 100.0f));

  - platform: homeassistant
    id: l2l3_voltage
    name: "L2-L3 Voltage"
    entity_id: ${ha_l2l3_voltage}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x304e, (uint16_t)(int16_t)(x * 100.0f));

  - platform: homeassistant
    id: l3l1_voltage
    name: "L3-L1 Voltage"
    entity_id: ${ha_l3l1_voltage}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x3056, (uint16_t)(int16_t)(x * 100.0f));

  # ── Currents (s16, ÷100, A) ──────────────────────────────────────────────
  - platform: homeassistant
    id: l1_current
    name: "L1 Current"
    entity_id: ${ha_l1_current}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x3041, (uint16_t)(int16_t)(x * 100.0f));

  - platform: homeassistant
    id: l2_current
    name: "L2 Current"
    entity_id: ${ha_l2_current}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x3049, (uint16_t)(int16_t)(x * 100.0f));

  - platform: homeassistant
    id: l3_current
    name: "L3 Current"
    entity_id: ${ha_l3_current}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x3051, (uint16_t)(int16_t)(x * 100.0f));

  # ── Active power per phase (s32b, ÷1, W) ─────────────────────────────────
  # Positive = import (consuming), negative = export (feeding in).
  # Total power (0x3080-81) is recalculated on every phase update.
  - platform: homeassistant
    id: l1_power
    name: "L1 Power"
    entity_id: ${ha_l1_power}
    on_value:
      then:
        - lambda: |-
            id(raw_l1_power) = (int32_t)(x);
            int32_t v = id(raw_l1_power);
            id(victron_meter)->write_holding_register(0x3082, (uint16_t)((v >> 16) & 0xFFFF));
            id(victron_meter)->write_holding_register(0x3083, (uint16_t)(v & 0xFFFF));
            int32_t total = id(raw_l1_power) + id(raw_l2_power) + id(raw_l3_power);
            id(victron_meter)->write_holding_register(0x3080, (uint16_t)((total >> 16) & 0xFFFF));
            id(victron_meter)->write_holding_register(0x3081, (uint16_t)(total & 0xFFFF));

  - platform: homeassistant
    id: l2_power
    name: "L2 Power"
    entity_id: ${ha_l2_power}
    on_value:
      then:
        - lambda: |-
            id(raw_l2_power) = (int32_t)(x);
            int32_t v = id(raw_l2_power);
            id(victron_meter)->write_holding_register(0x3086, (uint16_t)((v >> 16) & 0xFFFF));
            id(victron_meter)->write_holding_register(0x3087, (uint16_t)(v & 0xFFFF));
            int32_t total = id(raw_l1_power) + id(raw_l2_power) + id(raw_l3_power);
            id(victron_meter)->write_holding_register(0x3080, (uint16_t)((total >> 16) & 0xFFFF));
            id(victron_meter)->write_holding_register(0x3081, (uint16_t)(total & 0xFFFF));

  - platform: homeassistant
    id: l3_power
    name: "L3 Power"
    entity_id: ${ha_l3_power}
    on_value:
      then:
        - lambda: |-
            id(raw_l3_power) = (int32_t)(x);
            int32_t v = id(raw_l3_power);
            id(victron_meter)->write_holding_register(0x308a, (uint16_t)((v >> 16) & 0xFFFF));
            id(victron_meter)->write_holding_register(0x308b, (uint16_t)(v & 0xFFFF));
            int32_t total = id(raw_l1_power) + id(raw_l2_power) + id(raw_l3_power);
            id(victron_meter)->write_holding_register(0x3080, (uint16_t)((total >> 16) & 0xFFFF));
            id(victron_meter)->write_holding_register(0x3081, (uint16_t)(total & 0xFFFF));

  # ── Frequency (u16, ÷100, Hz) ────────────────────────────────────────────
  - platform: homeassistant
    id: grid_frequency
    name: "Grid Frequency"
    entity_id: ${ha_frequency}
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->write_holding_register(0x3032, (uint16_t)(x * 100.0f));

  # ── Energy (u32b, ÷100, kWh — HA sensor already in kWh) ─────────────────
  - platform: homeassistant
    id: energy_import
    name: "Energy Import"
    entity_id: ${ha_energy_import}
    on_value:
      then:
        - lambda: |-
            uint32_t v = (uint32_t)(x * 100.0f);
            id(victron_meter)->write_holding_register(0x3034, (uint16_t)((v >> 16) & 0xFFFF));
            id(victron_meter)->write_holding_register(0x3035, (uint16_t)(v & 0xFFFF));

  - platform: homeassistant
    id: energy_export
    name: "Energy Export"
    entity_id: ${ha_energy_export}
    on_value:
      then:
        - lambda: |-
            uint32_t v = (uint32_t)(x * 100.0f);
            id(victron_meter)->write_holding_register(0x3036, (uint16_t)((v >> 16) & 0xFFFF));
            id(victron_meter)->write_holding_register(0x3037, (uint16_t)(v & 0xFFFF));
