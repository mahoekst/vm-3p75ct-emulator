# ── Local development version ─────────────────────────────────────────────────
# Uses the component from your local filesystem so you can edit C++ and
# recompile immediately without pushing to GitHub.
# Do NOT paste this file into Home Assistant — use em24-emulator.yaml.

substitutions:
  device_name: em24-emulator
  modbus_unit_id: "1"    # Victron GX uses unit ID 1 when polling via Modbus TCP

# ── ESPHome core ───────────────────────────────────────────────────────────────
esphome:
  name: ${device_name}
  friendly_name: Carlo Gavazzi EM24 Emulator
  on_boot:
    priority: 200
    then:
      - lambda: |-
          // Set static values that have no HA sensor
          id(victron_meter)->set_frequency(50.0f);
          id(victron_meter)->set_energy_export(0.0f);  // Zaptec only imports

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret esphome_ota_password

captive_portal:

logger:
  level: DEBUG   # verbose during development

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret esphome_ota_password

web_server:
  port: 80
  version: 3

# ── Modbus TCP server ──────────────────────────────────────────────────────────
external_components:
  - source:
      type: local
      path: components
    components: [ modbus_tcp_server ]

modbus_tcp_server:
  id: victron_meter
  port: 502
  unit_id: ${modbus_unit_id}
  phases: 3
  serial_number: "ESP32EM24DEV01"

# ── Zaptec sensors → Modbus registers ─────────────────────────────────────────
# Per-phase power is not available from Zaptec — computed as V × I (PF ≈ 1
# for EV charging). Total power is taken directly from charge_power.
# Energy import uses the cumulative energy_meter reading.
sensor:
  # ── Voltages ─────────────────────────────────────────────────────────────────
  - platform: homeassistant
    id: zaptec_v1
    entity_id: sensor.merovingen_20_voltage_phase_1
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->set_voltage(1, x);
            // Recompute L1 power whenever voltage updates
            if (!isnan(id(zaptec_i1).state))
              id(victron_meter)->set_power(1, x * id(zaptec_i1).state);

  - platform: homeassistant
    id: zaptec_v2
    entity_id: sensor.merovingen_20_voltage_phase_2
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->set_voltage(2, x);
            if (!isnan(id(zaptec_i2).state))
              id(victron_meter)->set_power(2, x * id(zaptec_i2).state);

  - platform: homeassistant
    id: zaptec_v3
    entity_id: sensor.merovingen_20_voltage_phase_3
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->set_voltage(3, x);
            if (!isnan(id(zaptec_i3).state))
              id(victron_meter)->set_power(3, x * id(zaptec_i3).state);

  # ── Currents ─────────────────────────────────────────────────────────────────
  - platform: homeassistant
    id: zaptec_i1
    entity_id: sensor.merovingen_20_current_phase_1
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->set_current(1, x);
            if (!isnan(id(zaptec_v1).state))
              id(victron_meter)->set_power(1, x * id(zaptec_v1).state);

  - platform: homeassistant
    id: zaptec_i2
    entity_id: sensor.merovingen_20_current_phase_2
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->set_current(2, x);
            if (!isnan(id(zaptec_v2).state))
              id(victron_meter)->set_power(2, x * id(zaptec_v2).state);

  - platform: homeassistant
    id: zaptec_i3
    entity_id: sensor.merovingen_20_current_phase_3
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->set_current(3, x);
            if (!isnan(id(zaptec_v3).state))
              id(victron_meter)->set_power(3, x * id(zaptec_v3).state);

  # ── Energy import (cumulative kWh) ───────────────────────────────────────────
  - platform: homeassistant
    id: zaptec_energy
    entity_id: sensor.merovingen_20_energy_meter
    on_value:
      then:
        - lambda: |-
            id(victron_meter)->set_energy_import(x);
            // Distribute equally across phases for per-phase energy registers
            id(victron_meter)->set_phase_energy_import(1, x / 3.0f);
            id(victron_meter)->set_phase_energy_import(2, x / 3.0f);
            id(victron_meter)->set_phase_energy_import(3, x / 3.0f);

# ── Web UI sensors — read back from component register map ────────────────────
  - platform: template
    name: "L1 Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_voltage(1);'
  - platform: template
    name: "L2 Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_voltage(2);'
  - platform: template
    name: "L3 Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_voltage(3);'
  - platform: template
    name: "L1 Current"
    unit_of_measurement: "A"
    accuracy_decimals: 3
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_current(1);'
  - platform: template
    name: "L2 Current"
    unit_of_measurement: "A"
    accuracy_decimals: 3
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_current(2);'
  - platform: template
    name: "L3 Current"
    unit_of_measurement: "A"
    accuracy_decimals: 3
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_current(3);'
  - platform: template
    name: "L1 Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_power(1);'
  - platform: template
    name: "L2 Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_power(2);'
  - platform: template
    name: "L3 Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_power(3);'
  - platform: template
    name: "Total Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_total_power();'
  - platform: template
    name: "Frequency"
    unit_of_measurement: "Hz"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_frequency();'
  - platform: template
    name: "Energy Import"
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_energy_import();'
