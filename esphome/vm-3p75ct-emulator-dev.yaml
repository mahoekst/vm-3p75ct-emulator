# ── Local development version ─────────────────────────────────────────────────
# Uses the component from your local filesystem so you can edit C++ and
# recompile immediately without pushing to GitHub.
# Do NOT paste this file into Home Assistant — use vm-3p75ct-emulator.yaml.

substitutions:
  device_name: vm-3p75ct-emulator
  modbus_unit_id: "1"    # Victron GX uses unit ID 1 when polling via Modbus TCP

  # ── Home Assistant entity IDs ───────────────────────────────────────────────
  # Replace each value with the entity_id of the matching sensor in your HA.
  # Units:  voltage → V,  current → A,  power → W,  frequency → Hz,  energy → kWh
  ha_l1_voltage:    sensor.grid_l1_voltage
  ha_l2_voltage:    sensor.grid_l2_voltage
  ha_l3_voltage:    sensor.grid_l3_voltage
  ha_l1l2_voltage:  sensor.grid_l1l2_voltage
  ha_l2l3_voltage:  sensor.grid_l2l3_voltage
  ha_l3l1_voltage:  sensor.grid_l3l1_voltage
  ha_l1_current:    sensor.grid_l1_current
  ha_l2_current:    sensor.grid_l2_current
  ha_l3_current:    sensor.grid_l3_current
  ha_l1_power:      sensor.grid_l1_power   # positive = import, negative = export
  ha_l2_power:      sensor.grid_l2_power
  ha_l3_power:      sensor.grid_l3_power
  ha_frequency:     sensor.grid_frequency
  ha_energy_import: sensor.grid_total_energy_import   # kWh, cumulative
  ha_energy_export: sensor.grid_total_energy_export   # kWh, cumulative

# ── ESPHome core ───────────────────────────────────────────────────────────────
esphome:
  name: ${device_name}
  friendly_name: Victron VM-3P75CT Emulator
  on_boot:
    priority: 200   # after WiFi + component setup
    then:
      - lambda: |-
          // Dummy data values — overrides zeros until real data sources are wired up.
          // Remove this on_boot block once live data is connected.

          // Voltage: 230.0 V per phase
          id(victron_meter)->set_voltage(1, 230.0f);
          id(victron_meter)->set_voltage(2, 230.0f);
          id(victron_meter)->set_voltage(3, 230.0f);

          // Current: 1.0 A per phase
          id(victron_meter)->set_current(1, 1.0f);
          id(victron_meter)->set_current(2, 1.0f);
          id(victron_meter)->set_current(3, 1.0f);

          // Power: 10 W per phase (total 30 W auto-calculated)
          id(victron_meter)->set_power(1, 10.0f);
          id(victron_meter)->set_power(2, 10.0f);
          id(victron_meter)->set_power(3, 10.0f);

          // Frequency: 50.0 Hz
          id(victron_meter)->set_frequency(50.0f);

          // Energy import: 1.0 kWh, export: 0 kWh
          id(victron_meter)->set_energy_import(1.0f);
          id(victron_meter)->set_energy_export(0.0f);

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret esphome_ota_password

captive_portal:

logger:
  level: DEBUG   # verbose during development

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret esphome_ota_password

web_server:
  port: 80
  version: 3

# ── Modbus TCP server ──────────────────────────────────────────────────────────
# Uses component from local filesystem — edit components/ and recompile directly.
external_components:
  - source:
      type: local
      path: components
    components: [ modbus_tcp_server ]

modbus_tcp_server:
  id: victron_meter
  port: 502
  unit_id: ${modbus_unit_id}
  # Uncomment and configure when connecting real HA sensors:
  # l1_voltage:    ${ha_l1_voltage}
  # l2_voltage:    ${ha_l2_voltage}
  # l3_voltage:    ${ha_l3_voltage}
  # l1l2_voltage:  ${ha_l1l2_voltage}
  # l2l3_voltage:  ${ha_l2l3_voltage}
  # l3l1_voltage:  ${ha_l3l1_voltage}
  # l1_current:    ${ha_l1_current}
  # l2_current:    ${ha_l2_current}
  # l3_current:    ${ha_l3_current}
  # l1_power:      ${ha_l1_power}
  # l2_power:      ${ha_l2_power}
  # l3_power:      ${ha_l3_power}
  # frequency:     ${ha_frequency}
  # energy_import: ${ha_energy_import}
  # energy_export: ${ha_energy_export}
