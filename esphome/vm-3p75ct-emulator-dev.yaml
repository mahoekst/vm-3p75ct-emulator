# ── Local development version ─────────────────────────────────────────────────
# Uses the component from your local filesystem so you can edit C++ and
# recompile immediately without pushing to GitHub.
# Do NOT paste this file into Home Assistant — use vm-3p75ct-emulator.yaml.

substitutions:
  device_name: vm-3p75ct-emulator
  modbus_unit_id: "1"    # Victron GX uses unit ID 1 when polling via Modbus TCP

  # ── Home Assistant entity IDs ───────────────────────────────────────────────
  # Replace each value with the entity_id of the matching sensor in your HA.
  # Units:  voltage → V,  current → A,  power → W,  frequency → Hz,  energy → kWh
  ha_l1_voltage:    sensor.grid_l1_voltage
  ha_l2_voltage:    sensor.grid_l2_voltage
  ha_l3_voltage:    sensor.grid_l3_voltage
  ha_l1l2_voltage:  sensor.grid_l1l2_voltage
  ha_l2l3_voltage:  sensor.grid_l2l3_voltage
  ha_l3l1_voltage:  sensor.grid_l3l1_voltage
  ha_l1_current:    sensor.grid_l1_current
  ha_l2_current:    sensor.grid_l2_current
  ha_l3_current:    sensor.grid_l3_current
  ha_l1_power:      sensor.grid_l1_power   # positive = import, negative = export
  ha_l2_power:      sensor.grid_l2_power
  ha_l3_power:      sensor.grid_l3_power
  ha_frequency:     sensor.grid_frequency
  ha_energy_import: sensor.grid_total_energy_import   # kWh, cumulative
  ha_energy_export: sensor.grid_total_energy_export   # kWh, cumulative

# ── ESPHome core ───────────────────────────────────────────────────────────────
esphome:
  name: ${device_name}
  friendly_name: Victron VM-3P75CT Emulator
  on_boot:
    priority: 200   # after WiFi + component setup
    then:
      - lambda: |-
          // Dummy data values — overrides zeros until real data sources are wired up.
          // Remove this on_boot block once live data is connected.

          // Voltage: 230.0 V per phase
          id(victron_meter)->set_voltage(1, 230.0f);
          id(victron_meter)->set_voltage(2, 230.0f);
          id(victron_meter)->set_voltage(3, 230.0f);

          // Current: 1.0 A per phase
          id(victron_meter)->set_current(1, 1.0f);
          id(victron_meter)->set_current(2, 1.0f);
          id(victron_meter)->set_current(3, 1.0f);

          // Power: 10 W per phase (total 30 W auto-calculated)
          id(victron_meter)->set_power(1, 10.0f);
          id(victron_meter)->set_power(2, 10.0f);
          id(victron_meter)->set_power(3, 10.0f);

          // Frequency: 50.0 Hz
          id(victron_meter)->set_frequency(50.0f);

          // Energy import: 100 kWh total + 33 kWh per phase; export: 0 kWh
          id(victron_meter)->set_energy_import(100.0f);
          id(victron_meter)->set_phase_energy_import(1, 33.3f);
          id(victron_meter)->set_phase_energy_import(2, 33.3f);
          id(victron_meter)->set_phase_energy_import(3, 33.3f);
          id(victron_meter)->set_energy_export(0.0f);

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret esphome_ota_password

captive_portal:

logger:
  level: DEBUG   # verbose during development

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret esphome_ota_password

web_server:
  port: 80
  version: 3

# ── Modbus TCP server ──────────────────────────────────────────────────────────
# Uses component from local filesystem — edit components/ and recompile directly.
external_components:
  - source:
      type: local
      path: components
    components: [ modbus_tcp_server ]

# ── Web UI sensors — read back from component register map ────────────────────
# These make the ESPHome web server display the values currently being served
# to the Cerbo GX. update_interval controls how often the web UI refreshes.
sensor:
  - platform: template
    name: "L1 Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_voltage(1);'
  - platform: template
    name: "L2 Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_voltage(2);'
  - platform: template
    name: "L3 Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_voltage(3);'
  - platform: template
    name: "L1 Current"
    unit_of_measurement: "A"
    accuracy_decimals: 3
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_current(1);'
  - platform: template
    name: "L2 Current"
    unit_of_measurement: "A"
    accuracy_decimals: 3
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_current(2);'
  - platform: template
    name: "L3 Current"
    unit_of_measurement: "A"
    accuracy_decimals: 3
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_current(3);'
  - platform: template
    name: "L1 Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_power(1);'
  - platform: template
    name: "L2 Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_power(2);'
  - platform: template
    name: "L3 Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_power(3);'
  - platform: template
    name: "Total Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_total_power();'
  - platform: template
    name: "Frequency"
    unit_of_measurement: "Hz"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_frequency();'
  - platform: template
    name: "Energy Import"
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_energy_import();'
  - platform: template
    name: "Energy Export"
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_energy_export();'
  - platform: template
    name: "L1 Energy Import"
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_phase_energy_import(1);'
  - platform: template
    name: "L2 Energy Import"
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_phase_energy_import(2);'
  - platform: template
    name: "L3 Energy Import"
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: 'return id(victron_meter)->get_phase_energy_import(3);'

modbus_tcp_server:
  id: victron_meter
  port: 502
  unit_id: ${modbus_unit_id}
  phases: 3   # 1 or 3
  # Uncomment and configure when connecting real HA sensors:
  # l1_voltage:    ${ha_l1_voltage}
  # l2_voltage:    ${ha_l2_voltage}
  # l3_voltage:    ${ha_l3_voltage}
  # l1l2_voltage:  ${ha_l1l2_voltage}
  # l2l3_voltage:  ${ha_l2l3_voltage}
  # l3l1_voltage:  ${ha_l3l1_voltage}
  # l1_current:    ${ha_l1_current}
  # l2_current:    ${ha_l2_current}
  # l3_current:    ${ha_l3_current}
  # l1_power:      ${ha_l1_power}
  # l2_power:      ${ha_l2_power}
  # l3_power:      ${ha_l3_power}
  # frequency:     ${ha_frequency}
  # energy_import: ${ha_energy_import}
  # energy_export: ${ha_energy_export}
