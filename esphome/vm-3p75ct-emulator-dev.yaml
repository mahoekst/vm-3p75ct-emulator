# ── Local development version ─────────────────────────────────────────────────
# Uses the component from your local filesystem so you can edit C++ and
# recompile immediately without pushing to GitHub.
# Do NOT paste this file into Home Assistant — use vm-3p75ct-emulator.yaml.

substitutions:
  device_name: vm-3p75ct-emulator
  modbus_unit_id: "1"    # Victron GX uses unit ID 1 when polling via Modbus TCP

  # ── Home Assistant entity IDs ───────────────────────────────────────────────
  # Replace each value with the entity_id of the matching sensor in your HA.
  # Units:  voltage → V,  current → A,  power → W,  frequency → Hz,  energy → kWh
  ha_l1_voltage:    sensor.grid_l1_voltage
  ha_l2_voltage:    sensor.grid_l2_voltage
  ha_l3_voltage:    sensor.grid_l3_voltage
  ha_l1l2_voltage:  sensor.grid_l1l2_voltage
  ha_l2l3_voltage:  sensor.grid_l2l3_voltage
  ha_l3l1_voltage:  sensor.grid_l3l1_voltage
  ha_l1_current:    sensor.grid_l1_current
  ha_l2_current:    sensor.grid_l2_current
  ha_l3_current:    sensor.grid_l3_current
  ha_l1_power:      sensor.grid_l1_power   # positive = import, negative = export
  ha_l2_power:      sensor.grid_l2_power
  ha_l3_power:      sensor.grid_l3_power
  ha_frequency:     sensor.grid_frequency
  ha_energy_import: sensor.grid_total_energy_import   # kWh, cumulative
  ha_energy_export: sensor.grid_total_energy_export   # kWh, cumulative

# ── ESPHome core ───────────────────────────────────────────────────────────────
esphome:
  name: ${device_name}
  friendly_name: Victron VM-3P75CT Emulator
  on_boot:
    priority: 200   # after WiFi + component setup
    then:
      - lambda: |-
          // ── Carlo Gavazzi EM24DINAV53XE1X identification registers ─────────
          // Source: github.com/victronenergy/dbus-modbus-client/carlo_gavazzi.py
          // The Cerbo GX probes register 0x000B over TCP to identify the meter.

          // 0x000B: Model ID = 1651 → EM24DINAV53XE1X (3-phase)
          id(victron_meter)->write_holding_register(0x000b, 1651);

          // 0x0302: Hardware version
          id(victron_meter)->write_holding_register(0x0302, 0x0100);

          // 0x0304: Firmware version
          id(victron_meter)->write_holding_register(0x0304, 0x0100);

          // 0x1002: Phase config = 0 → 3P.n (three-phase with neutral)
          id(victron_meter)->write_holding_register(0x1002, 0x0000);

          // 0x5000-0x5006: Serial number (7 registers, ASCII)
          id(victron_meter)->write_holding_register(0x5000, 0x3030); // "00"
          id(victron_meter)->write_holding_register(0x5001, 0x3030); // "00"
          id(victron_meter)->write_holding_register(0x5002, 0x3030); // "00"
          id(victron_meter)->write_holding_register(0x5003, 0x3030); // "00"
          id(victron_meter)->write_holding_register(0x5004, 0x3030); // "00"
          id(victron_meter)->write_holding_register(0x5005, 0x3030); // "00"
          id(victron_meter)->write_holding_register(0x5006, 0x3030); // "00"

          // 0xa000: Application mode = 7 (mode H, required by driver)
          id(victron_meter)->write_holding_register(0xa000, 7);

          // ── Dummy data values (s32l little-endian: low word first) ──────────
          // Voltage: 230.0 V → raw 2300 per phase
          id(victron_meter)->write_holding_register(0x0000, 2300); id(victron_meter)->write_holding_register(0x0001, 0); // L1
          id(victron_meter)->write_holding_register(0x0002, 2300); id(victron_meter)->write_holding_register(0x0003, 0); // L2
          id(victron_meter)->write_holding_register(0x0004, 2300); id(victron_meter)->write_holding_register(0x0005, 0); // L3

          // Current: 1.0 A → raw 1000 per phase
          id(victron_meter)->write_holding_register(0x000c, 1000); id(victron_meter)->write_holding_register(0x000d, 0); // L1
          id(victron_meter)->write_holding_register(0x000e, 1000); id(victron_meter)->write_holding_register(0x000f, 0); // L2
          id(victron_meter)->write_holding_register(0x0010, 1000); id(victron_meter)->write_holding_register(0x0011, 0); // L3

          // Power: 10 W per phase → raw 100; total 30 W
          id(victron_meter)->write_holding_register(0x0012, 100); id(victron_meter)->write_holding_register(0x0013, 0); // L1
          id(victron_meter)->write_holding_register(0x0014, 100); id(victron_meter)->write_holding_register(0x0015, 0); // L2
          id(victron_meter)->write_holding_register(0x0016, 100); id(victron_meter)->write_holding_register(0x0017, 0); // L3
          id(victron_meter)->write_holding_register(0x0028, 300); id(victron_meter)->write_holding_register(0x0029, 0); // Total

          // Frequency: 50.0 Hz → raw 500
          id(victron_meter)->write_holding_register(0x0033, 500);

          // Energy import: 1.0 kWh → raw 10
          id(victron_meter)->write_holding_register(0x0034, 10); id(victron_meter)->write_holding_register(0x0035, 0);

          // Energy export: 0 kWh
          id(victron_meter)->write_holding_register(0x004e, 0); id(victron_meter)->write_holding_register(0x004f, 0);

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret esphome_ota_password

captive_portal:

logger:
  level: DEBUG   # verbose during development

api:
  encryption:
    key: !secret esphome_api_key

ota:
  - platform: esphome
    password: !secret esphome_ota_password

web_server:
  port: 80
  version: 3

# ── Modbus TCP server ──────────────────────────────────────────────────────────
# Uses component from local filesystem — edit components/ and recompile directly.
external_components:
  - source:
      type: local
      path: components
    components: [ modbus_tcp_server ]

modbus_tcp_server:
  id: victron_meter
  port: 502
  unit_id: ${modbus_unit_id}

# No sensor block — dummy values are written statically in on_boot above.
